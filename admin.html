<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
font-family:Poppins;
margin:0;
background:#f4f6fb;
}

/* HEADER */
header{
background:#6a11cb;
color:white;
padding:15px;
text-align:center;
}

#logoutBtn{
display:none;
background:#333;
margin-top:10px;
}

/* LOGIN */
#loginBox{
max-width:400px;
margin:80px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#007bff;
color:white;
font-weight:600;
cursor:pointer;
}

/* DASHBOARD */
.container{
padding:20px;
display:none;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
display:flex;
gap:20px;
align-items:flex-start;
}

img{
width:100%;
max-width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}

.actions{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.left{
display:flex;
flex-direction:column;
gap:10px;
}

.right{
flex:1;
}

.section{
margin-top:10px;
}

.label{
font-size:13px;
color:#888;
}

.value{
font-weight:600;
margin-bottom:6px;
}

.status{
display:inline-block;
padding:4px 10px;
border-radius:8px;
color:white;
font-size:12px;
}

.install{background:#28a745;color:white;}
.delete{background:#dc3545;color:white;}
.download{background:#007bff;color:white;}

.btn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.install{background:green;color:white;}
.delete{background:red;color:white;}
.download{background:#007bff;color:white;}
</style>
</head>

<body>

<header>
<h2>📊 Converge Admin Dashboard</h2>
<button id="logoutBtn" onclick="logout()">Logout</button>
</header>

<!-- LOGIN -->
<div id="loginBox">
<h3>Admin Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="container" id="dashboard">
<div id="list"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

// 🔥 CONFIG
firebase.initializeApp({
apiKey:"AIzaSyBwrJprjuU4BywFapZyw_SsBcsJAYo5OPU",
authDomain:"convergecrm-7c237.firebaseapp.com",
projectId:"convergecrm-7c237"
});

const db = firebase.firestore();
const auth = firebase.auth();

function getStatusColor(status){
return status === "Installed" ? "green" : "orange";
}

// 🔐 LOGIN (ONLY YOUR EMAIL)
function login(){
const email = document.getElementById("email").value;
const pass = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email, pass)
.then(user=>{
    if(user.user.email !== "admin@converge.com"){
        alert("Not authorized!");
        auth.signOut();
    }
})
.catch(err=>{
    alert("Login Failed");
});
}

// 🔐 LOGOUT
function logout(){
auth.signOut();
}

// 🔐 AUTH STATE
auth.onAuthStateChanged(user=>{
if(user && user.email === "admin@converge.com"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("dashboard").style.display="block";
    document.getElementById("logoutBtn").style.display="inline-block";
    loadData();
}else{
    document.getElementById("loginBox").style.display="block";
    document.getElementById("dashboard").style.display="none";
    document.getElementById("logoutBtn").style.display="none";
}
});

// 🔥 LOAD DATA
function loadData(){
db.collection("applications")
.onSnapshot(snapshot => {

    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc => {

        const d = doc.data();

        list.innerHTML += `
<div class="card">

    <!-- LEFT (IMAGES) -->
    <div class="left">
        <img src="${d.idURL}">
        <img src="${d.sigURL}">
    </div>

    <!-- RIGHT (DATA) -->
    <div class="right">

        <h3>${d.name}</h3>

        <div class="section">
            <div class="label">Plan</div>
            <div class="value">${d.plan}</div>

            <div class="label">Address</div>
            <div class="value">${d.address}</div>

            <div class="label">Contact</div>
            <div class="value">${d.phone}</div>

            <div class="label">Status</div>
            <span class="status" style="background:${getStatusColor(d.status)}">
                ${d.status}
            </span>
        </div>

        <div class="section actions">
            <a href="${d.idURL}" target="_blank">
                <button class="btn download">ID</button>
            </a>

            <a href="${d.sigURL}" target="_blank">
                <button class="btn download">Signature</button>
            </a>

            <button class="btn download" onclick="downloadAll('${d.idURL}','${d.sigURL}')">
                Download All
            </button>

            ${d.pdfURL ? `
            <a href="${d.pdfURL}" target="_blank">
                <button class="btn download">PDF</button>
            </a>
            ` : ""}
        </div>

        <div class="section actions">
            <button class="btn install" onclick="markInstalled('${doc.id}')">
                ✔ Installed
            </button>

            <button class="btn delete" onclick="deleteApp('${doc.id}')">
                🗑 Delete
            </button>
        </div>

    </div>

</div>
`;
    });

});
}

// ✅ DOWNLOAD ALL
function downloadAll(idURL, sigURL){

    const a1 = document.createElement("a");
    a1.href = idURL;
    a1.download = "ID.jpg";
    document.body.appendChild(a1);
    a1.click();
    document.body.removeChild(a1);

    setTimeout(()=>{
        const a2 = document.createElement("a");
        a2.href = sigURL;
        a2.download = "Signature.jpg";
        document.body.appendChild(a2);
        a2.click();
        document.body.removeChild(a2);
    }, 500);
}

// UPDATE
function markInstalled(id){
db.collection("applications").doc(id).update({
status:"Installed"
});
}

// DELETE
function deleteApp(id){
if(confirm("Delete?")){
db.collection("applications").doc(id).delete();
}
}

</script>

</body>
</html>
