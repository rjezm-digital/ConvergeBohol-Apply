<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converge Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
font-family:Poppins;
margin:0;
background:linear-gradient(135deg,#0d2b45,#1b4f72);
}

/* HEADER */
header{
background:linear-gradient(90deg,#6a11cb,#2575fc);
color:white;
padding:15px;
text-align:center;
}

#logoutBtn{
display:none;
background:#222;
margin-top:10px;
padding:10px;
border-radius:10px;
}

/* SEARCH */
.search-box{
max-width:500px;
margin:15px auto;
padding:0 15px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
outline:none;
}

/* LOGIN */
#loginBox{
max-width:400px;
margin:80px auto;
background:white;
padding:20px;
border-radius:15px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

/* DASHBOARD */
.container{
padding:12px;
display:grid;
grid-template-columns:repeat(2, minmax(0,1fr)); /* ✅ strict 2 columns */
gap:10px;
}

/* CARD */
.card{
width:100%;
min-width:0; /* ✅ prevents stretching */
background:white;
border-radius:12px;
padding:12px;
display:grid;
grid-template-columns:80px 1fr;
gap:10px;
}

/* IMAGE */
.left img{
width:100%;
height:65px;
object-fit:cover;
border-radius:8px;
}

/* RIGHT */
.right h3{
font-size:13px;
margin:0;
}

.label{
font-size:10px;
}

.value{
font-size:11px;
}

/* STATUS */
.status{
display:inline-block;
padding:3px 8px;
border-radius:6px;
color:white;
font-size:11px;
}

/* BUTTON GRID (same size as image) */
.btn-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:4px;
margin-top:6px;
}

.btn{
height:28px;
font-size:11px;
padding:0;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:linear-gradient(90deg,#6a11cb,#2575fc);
color:white;
position:sticky;
top:0;
z-index:100;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* LEFT */
.left-header h2{
margin:0;
font-size:16px;
}

.sub{
font-size:11px;
opacity:0.8;
}

/* RIGHT */
.right-header{
display:flex;
gap:10px;
align-items:center;
}

.right-header input{
padding:8px 10px;
border-radius:10px;
border:none;
outline:none;
width:150px;
font-size:12px;
}

@media(max-width:600px){
.container{
grid-template-columns:1fr; /* 1 column on phone */
}
}

/* LOGOUT */
#logoutBtn{
background:#222;
color:white;
padding:8px 12px;
border-radius:8px;
font-size:12px;
}

.install{background:#28a745;color:white;}
.delete{background:#dc3545;color:white;}
.download{background:#007bff;color:white;}
</style>
</head>

<body>

<header class="topbar">

<div class="left-header">
    <h2>📊 Converge Admin</h2>
    <span class="sub">Dashboard</span>
</div>

<div class="right-header">
    <input type="text" id="search" placeholder="Search name...">
    <button id="logoutBtn" onclick="logout()">Logout</button>
</div>

</header>

<!-- LOGIN -->
<div id="loginBox">
<h3>Admin Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="container" id="dashboard">
<div id="list"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

// CONFIG
firebase.initializeApp({
apiKey:"AIzaSyBwrJprjuU4BywFapZyw_SsBcsJAYo5OPU",
authDomain:"convergecrm-7c237.firebaseapp.com",
projectId:"convergecrm-7c237"
});

const db = firebase.firestore();
const auth = firebase.auth();

function getStatusColor(status){
return status === "Installed" ? "#28a745" : "#ff9800";
}

// LOGIN
function login(){
auth.signInWithEmailAndPassword(
email.value,
password.value
).catch(()=>alert("Login Failed"));
}

function logout(){
auth.signOut();
}

// AUTH
auth.onAuthStateChanged(user=>{
if(user){
loginBox.style.display="none";
dashboard.style.display="block";
logoutBtn.style.display="inline-block";
loadData();
}else{
loginBox.style.display="block";
dashboard.style.display="none";
logoutBtn.style.display="none";
}
});

// LOAD DATA + SEARCH
function loadData(){

const searchInput = document.getElementById("search");

db.collection("applications").onSnapshot(snapshot=>{

let html = "";

snapshot.forEach(doc=>{
const d = doc.data();

// 🔍 SEARCH FILTER
if(searchInput.value &&
!d.name?.toLowerCase().includes(searchInput.value.toLowerCase())){
return;
}

html += `
<div class="card">

<div class="left">
<img src="${d.idURL}">
<img src="${d.sigURL}">
</div>

<div class="right">
<h3>${d.name || "No Name"}</h3>

<div class="label">Plan</div>
<div class="value">${d.plan}</div>

<div class="label">Address</div>
<div class="value">${d.address}</div>

<div class="label">Contact</div>
<div class="value">${d.phone}</div>

<div class="label">Status</div>
<span class="status" style="background:${getStatusColor(d.status)}">
${d.status}
</span>

<div class="btn-grid">

<a href="${d.idURL}" target="_blank">
<button class="btn download">ID</button>
</a>

<a href="${d.sigURL}" target="_blank">
<button class="btn download">Sign</button>
</a>

<button class="btn download"
onclick="downloadAll('${d.idURL}','${d.sigURL}')">
All
</button>

<button class="btn install"
onclick="markInstalled('${doc.id}')">
✔
</button>

<button class="btn delete"
onclick="deleteApp('${doc.id}')">
🗑
</button>

</div>

</div>
</div>
`;
});

document.getElementById("list").innerHTML = html;

});

// 🔍 LIVE SEARCH
searchInput.addEventListener("input", loadData);

}

// DOWNLOAD ALL
function downloadAll(idURL,sigURL){
window.open(idURL);
setTimeout(()=>window.open(sigURL),500);
}

// UPDATE
function markInstalled(id){
db.collection("applications").doc(id).update({
status:"Installed"
});
}

// DELETE
function deleteApp(id){
if(confirm("Delete?")){
db.collection("applications").doc(id).delete();
}
}

</script>

</body>
</html>
