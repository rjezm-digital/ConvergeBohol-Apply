<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converge Admin Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#0d2b45,#1b4f72);
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 16px;
background:linear-gradient(90deg,#6a11cb,#2575fc);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

header h2{
margin:0;
font-size:16px;
}

.top-controls{
display:flex;
gap:8px;
}

header input{
padding:8px 10px;
border-radius:10px;
border:none;
outline:none;
width:150px;
}

#logoutBtn{
background:#111;
color:white;
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.stat{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:12px;
border-radius:12px;
text-align:center;
}

.stat h3{
margin:0;
font-size:18px;
}

.stat p{
margin:0;
font-size:11px;
opacity:0.8;
}

/* GRID */
.container{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

@media(max-width:600px){
.container{
grid-template-columns:1fr;
}
}

/* CARD */
.card{
background:rgba(0,0,0,0.7);
border-radius:14px;
padding:10px;
display:grid;
grid-template-columns:70px 1fr;
gap:10px;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

/* LEFT IMAGES */
.left{
display:flex;
flex-direction:column;
gap:6px;
}

.left img{
width:100%;
height:60px;
object-fit:cover;
border-radius:6px;
}

/* RIGHT */
.right h3{
margin:0;
font-size:13px;
font-weight:600;
}

.label{
font-size:10px;
color:#aaa;
}

.value{
font-size:11px;
margin-bottom:4px;
}

/* STATUS */
.status{
display:inline-block;
padding:3px 8px;
border-radius:8px;
font-size:10px;
margin-bottom:6px;
}

.pending{background:#ff9800;}
.installed{background:#28a745;}

/* BUTTON GRID */
.btn-grid{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:6px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:4px;
padding:6px 8px;
font-size:10px;
border:none;
border-radius:8px;
cursor:pointer;
min-width:48px;
height:28px;

background:rgba(255,255,255,0.08);
color:white;
backdrop-filter:blur(6px);

transition:0.2s;
}

/* HOVER EFFECT */
.btn:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.15);
}

/* COLORS (soft, not harsh) */
.btn.id{color:#4dabf7;}
.btn.sign{color:#a78bfa;}
.btn.all{color:#38bdf8;}
.btn.install{color:#22c55e;}
.btn.delete{color:#ef4444;}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:16px;
padding:12px;
display:grid;
grid-template-columns:70px 1fr;
gap:10px;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
border:1px solid rgba(255,255,255,0.1);
transition:0.25s;
}

.card:hover{
transform:translateY(-3px) scale(1.01);
box-shadow:0 15px 30px rgba(0,0,0,0.35);
}

.right{
display:flex;
flex-direction:column;
justify-content:space-between;
}

.download{background:#007bff;color:white;}
.install{background:#28a745;color:white;}
.delete{background:#dc3545;color:white;}

/* EMPTY */
.empty{
text-align:center;
margin-top:40px;
opacity:0.7;
}
</style>
</head>

<body>

<header>
<h2>📊 Converge Admin</h2>

<div class="top-controls">
<input type="text" id="search" placeholder="Search...">
<button id="logoutBtn" onclick="logout()">Logout</button>
</div>
</header>

<!-- STATS -->
<div class="stats">
<div class="stat">
<h3 id="total">0</h3>
<p>Total</p>
</div>

<div class="stat">
<h3 id="installed">0</h3>
<p>Installed</p>
</div>

<div class="stat">
<h3 id="pending">0</h3>
<p>Pending</p>
</div>
</div>

<div class="container" id="list"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

// CONFIG
firebase.initializeApp({
apiKey:"AIzaSyBwrJprjuU4BywFapZyw_SsBcsJAYo5OPU",
authDomain:"convergecrm-7c237.firebaseapp.com",
projectId:"convergecrm-7c237"
});

const db = firebase.firestore();

function loadData(){

const search = document.getElementById("search").value.toLowerCase();

db.collection("applications").orderBy("date","desc")
.onSnapshot(snapshot=>{

let html="";
let total=0, installed=0, pending=0;

snapshot.forEach(doc=>{
const d = doc.data();

total++;

if(d.status==="Installed") installed++;
else pending++;

const match =
d.name?.toLowerCase().includes(search) ||
d.phone?.includes(search) ||
d.plan?.toLowerCase().includes(search);

if(search && !match) return;

html += `
<div class="card">

<div class="left">
<img src="${d.idURL}">
<img src="${d.sigURL}">
</div>

<div class="right">

<h3>
${d.name || d.fullName || d.customerName || d.clientName || "No Name"}
</h3>

<div class="label">Plan</div>
<div class="value">${d.plan}</div>

<div class="label">Address</div>
<div class="value">${d.address || "No address"}</div>

<div class="label">Contact</div>
<div class="value">${d.phone}</div>

<span class="status ${d.status==="Installed"?"installed":"pending"}">
${d.status}
</span>

<div class="btn-grid">

<button class="btn id" onclick="window.open('${d.idURL}')">
📄 ID
</button>

<button class="btn sign" onclick="window.open('${d.sigURL}')">
✍️ Sign
</button>

<button class="btn all" onclick="downloadAll('${d.idURL}','${d.sigURL}')">
⬇ All
</button>

<button class="btn install" onclick="markInstalled('${doc.id}')">
✔ Done
</button>

<button class="btn delete" onclick="deleteApp('${doc.id}')">
🗑
</button>

</div>

</div>
</div>
`;
});

document.getElementById("list").innerHTML =
html || `<div class="empty">No data found</div>`;

document.getElementById("total").innerText = total;
document.getElementById("installed").innerText = installed;
document.getElementById("pending").innerText = pending;

});
}

// SEARCH
document.getElementById("search").addEventListener("input", loadData);

// ACTIONS
function downloadAll(idURL,sigURL){
window.open(idURL);
setTimeout(()=>window.open(sigURL),400);
}

function markInstalled(id){
db.collection("applications").doc(id).update({
status:"Installed"
});
}

function deleteApp(id){
if(confirm("Delete application?")){
db.collection("applications").doc(id).delete();
}
}

function logout(){
alert("Logout logic here (optional)");
}

// INIT
loadData();

</script>

</body>
</html>
