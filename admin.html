<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converge Admin Pro Max</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#0d2b45,#1b4f72);
color:white;
overflow-x:hidden;
}

/* ===== HEADER ===== */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 16px;
background:linear-gradient(90deg,#6a11cb,#2575fc);
}

.top-controls{
display:none;
gap:8px;
}

header input{
padding:8px 10px;
border-radius:10px;
border:none;
outline:none;
}

#logoutBtn{
background:#111;
color:white;
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
}

/* ===== LOGIN ===== */
.login-box{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.7);
padding:25px;
border-radius:20px;
backdrop-filter:blur(15px);
z-index:10;
}

.login-box input{
display:block;
width:220px;
margin:10px 0;
padding:10px;
border-radius:10px;
border:none;
}

.login-box button{
padding:10px;
border:none;
border-radius:10px;
background:#2575fc;
color:white;
cursor:pointer;
}

/* ===== BLUR BACKGROUND ===== */
.blur{
filter:blur(8px);
pointer-events:none;
}

/* ===== STATS ===== */
.stats{
display:none;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.stat{
background:rgba(255,255,255,0.1);
padding:12px;
border-radius:12px;
text-align:center;
backdrop-filter:blur(10px);
}

/* ===== GRID ===== */
.container{
display:none;
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

@media(max-width:600px){
.container{
grid-template-columns:1fr;
}
}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:16px;
padding:12px;
display:grid;
grid-template-columns:70px 1fr;
gap:10px;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
transition:0.2s;
}

.card:hover{
transform:translateY(-3px);
}

/* LEFT */
.left{
display:flex;
flex-direction:column;
gap:6px;
}
.left img{
width:100%;
height:60px;
border-radius:6px;
object-fit:cover;
}

/* RIGHT */
.right h3{
margin:0;
font-size:13px;
}

.label{font-size:10px;color:#aaa;}
.value{font-size:11px;margin-bottom:4px;}

/* STATUS */
.status{
display:block;
padding:5px;
border-radius:8px;
font-size:10px;
margin:6px 0;
text-align:center;
}
.pending{background:#ff9800;}
.installed{background:#28a745;}

/* BUTTONS */
.btn-grid{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.btn{
flex:1;
min-width:55px;
height:28px;
border:none;
border-radius:8px;
font-size:10px;
cursor:pointer;
background:rgba(255,255,255,0.1);
color:white;
}

.btn:hover{
background:rgba(255,255,255,0.2);
}

.btn.install{background:#22c55e;}
.btn.delete{background:#ef4444;}

/* EMPTY */
.empty{
text-align:center;
margin-top:40px;
opacity:0.6;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
<h3>Admin Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="mainContent" class="blur">

<header>
<h2>📊 Converge Admin</h2>

<div class="top-controls" id="topControls">
<input type="text" id="search" placeholder="Search...">
<button id="logoutBtn" onclick="logout()">Logout</button>
</div>
</header>

<div class="stats" id="stats">
<div class="stat"><h3 id="total">0</h3><p>Total</p></div>
<div class="stat"><h3 id="installed">0</h3><p>Installed</p></div>
<div class="stat"><h3 id="pending">0</h3><p>Pending</p></div>
</div>

<div class="container" id="list"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

// FIREBASE CONFIG
firebase.initializeApp({
apiKey:"AIzaSyBwrJprjuU4BywFapZyw_SsBcsJAYo5OPU",
authDomain:"convergecrm-7c237.firebaseapp.com",
projectId:"convergecrm-7c237"
});

const db = firebase.firestore();
const auth = firebase.auth();

auth.signOut();

// LOGIN
function login(){
const email = document.getElementById("email").value;
const pass = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,pass)
.then(()=>{})
.catch(()=>alert("Login failed"));
}

// LOGOUT
function logout(){
auth.signOut();
}

// AUTH STATE
auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("loginBox").style.display="none";
document.getElementById("mainContent").classList.remove("blur");
document.getElementById("list").style.display="grid";
document.getElementById("stats").style.display="grid";
document.getElementById("topControls").style.display="flex";
loadData();
}else{
document.getElementById("loginBox").style.display="block";
document.getElementById("mainContent").classList.add("blur");
}
});

// LOAD DATA
function loadData(){
const search = document.getElementById("search").value.toLowerCase();

db.collection("applications").orderBy("date","desc")
.onSnapshot(snapshot=>{

let html="";
let total=0, installed=0, pending=0;

snapshot.forEach(doc=>{
const d = doc.data();

total++;
if(d.status==="Installed") installed++;
else pending++;

if(search &&
!d.name?.toLowerCase().includes(search) &&
!d.phone?.includes(search) &&
!d.plan?.toLowerCase().includes(search)) return;

html += `
<div class="card">
<div class="left">
<img src="${d.idURL}">
<img src="${d.sigURL}">
</div>

<div class="right">

<h3>${d.name || "No Name"}</h3>

<div class="label">Plan</div>
<div class="value">${d.plan}</div>

<div class="label">Address</div>
<div class="value">${d.address || "-"}</div>

<div class="label">Contact</div>
<div class="value">${d.phone}</div>

<div class="status ${d.status==="Installed"?"installed":"pending"}">
${d.status}
</div>

<div class="btn-grid">
<button class="btn" onclick="window.open('${d.idURL}')">ID</button>
<button class="btn" onclick="window.open('${d.sigURL}')">Sign</button>
<button class="btn" onclick="downloadAll('${d.idURL}','${d.sigURL}')">All</button>
<button class="btn install" onclick="markInstalled('${doc.id}')">✔</button>
<button class="btn delete" onclick="deleteApp('${doc.id}')">🗑</button>
</div>

</div>
</div>
`;
});

document.getElementById("list").innerHTML =
html || `<div class="empty">No applications yet</div>`;

document.getElementById("total").innerText = total;
document.getElementById("installed").innerText = installed;
document.getElementById("pending").innerText = pending;

});
}

// ACTIONS
function downloadAll(id,sig){
window.open(id);
setTimeout(()=>window.open(sig),400);
}

function markInstalled(id){
db.collection("applications").doc(id).update({status:"Installed"});
}

function deleteApp(id){
if(confirm("Delete?")){
db.collection("applications").doc(id).delete();
}
}

// SEARCH
document.getElementById("search").addEventListener("input", loadData);

</script>

</body>
</html>
